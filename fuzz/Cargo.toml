[package]
name = "garage-fuzz"
version = "0.0.0"
publish = false
edition = "2018"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1.4.2", features = ["derive"] }
libfuzzer-sys = "0.4"

[dependencies.garage_table]
path = "../src/table"

[dependencies.garage_model]
path = "../src/model"
features = ["arbitrary"]

